  <style>
    :root { --bg: #f7f7f4; --panel: #ffffff; --ink: #202124; --muted: #5f6368; --line: #d8d9d3; --accent: #0f766e; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; color: var(--ink); background: var(--bg); }
    .app { display: grid; grid-template-columns: 360px 1fr; min-height: 100vh; }
    aside { background: var(--panel); border-right: 1px solid var(--line); padding: 18px; overflow: auto; max-height: 100vh; }
    h1 { font-size: 21px; line-height: 1.2; margin: 0 0 8px; }
    .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
    .stat { border: 1px solid var(--line); border-radius: 8px; padding: 9px; background: #fbfbf9; }
    .stat b { display: block; font-size: 19px; }
    .stat span { color: var(--muted); font-size: 11px; }
    .search { width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 10px 11px; font-size: 14px; margin: 4px 0 12px; }
    .filters { display: grid; gap: 7px; margin-bottom: 14px; }
    label { display: flex; gap: 8px; align-items: center; font-size: 13px; color: var(--ink); }
    label input { accent-color: var(--accent); }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex: 0 0 auto; }
    .list { display: grid; gap: 8px; }
    .item { border: 1px solid var(--line); border-radius: 8px; padding: 9px; background: #fff; cursor: pointer; }
    .item:hover { border-color: #9ca3af; }
    .item strong { display: block; font-size: 13px; }
    .item span { display: block; color: var(--muted); font-size: 12px; margin-top: 2px; }
    #map { width: 100%; height: 100vh; }
    .leaflet-popup-content { font-size: 13px; line-height: 1.35; }
    .popup-title { font-weight: 700; font-size: 15px; margin-bottom: 6px; }
    .popup-row { margin: 2px 0; }
    .note { margin-top: 12px; color: var(--muted); font-size: 11px; line-height: 1.35; }
    @media (max-width: 820px) { .app { grid-template-columns: 1fr; } aside { max-height: 42vh; border-right: 0; border-bottom: 1px solid var(--line); } #map { height: 58vh; } }
  </style>
</head>

    const colorMap = {"CENTRO OESTE": "#2563eb", "METROPOLITANA": "#dc2626", "NOROESTE": "#16a34a", "SUL DE MINAS": "#ca8a04", "TRIÂNGULO MINEIRO": "#9333ea", "ZONA DA MATA": "#0891b2"};
    const regionCounts = {"CENTRO OESTE": 67, "METROPOLITANA": 33, "NOROESTE": 17, "SUL DE MINAS": 168, "TRIÂNGULO MINEIRO": 86, "ZONA DA MATA": 215};
    const map = L.map('map', { preferCanvas: true }).setView([-20.587054, -44.854098], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap contributors' }).addTo(map);
    const activeRegions = new Set(Object.keys(colorMap));
    const markers = new Map();
    const layer = L.layerGroup().addTo(map);
    const listEl = document.getElementById('list');
    const filtersEl = document.getElementById('filters');
    const searchEl = document.getElementById('search');
    function markerHtml(color) { return `<span style="background:${color};width:13px;height:13px;border-radius:50%;display:block;border:2px solid white;box-shadow:0 0 0 1px rgba(0,0,0,.35)"></span>`; }
    function popup(r) {
      const ajuste = r.tipo_match === 'município' ? '' : `<div class="popup-row"><b>Ajuste:</b> ${r.tipo_match}</div>`;
      return `<div class="popup-title">${r.cidade_destino}</div><div class="popup-row"><b>Nome no mapa:</b> ${r.nome_mapa}</div><div class="popup-row"><b>Região:</b> ${r.regiao}</div><div class="popup-row"><b>Unidade:</b> ${r.unidade_destino || '-'}</div><div class="popup-row"><b>Rota:</b> ${r.rotas || '-'}</div><div class="popup-row"><b>Lead time:</b> ${r.lead_time || '-'}</div>${ajuste}<div class="popup-row"><b>Coords:</b> ${r.latitude}, ${r.longitude}</div>`;
    }
    data.forEach((r, i) => {
      const color = colorMap[r.regiao] || '#111827';
      const icon = L.divIcon({ html: markerHtml(color), className: '', iconSize: [13, 13], iconAnchor: [6, 6] });
      const m = L.marker([r.latitude, r.longitude], { icon }).bindPopup(popup(r));
      markers.set(i, m);
    });
    Object.entries(colorMap).forEach(([region, color]) => {
      const label = document.createElement('label');
      label.innerHTML = `<input type="checkbox" checked data-region="${region}"><span class="dot" style="background:${color}"></span><span>${region} (${regionCounts[region]})</span>`;
      filtersEl.appendChild(label);
    });
    function matchesSearch(r, q) {
      if (!q) return true;
      const text = `${r.cidade_destino} ${r.nome_mapa} ${r.unidade_destino} ${r.rotas} ${r.regiao}`.toLowerCase();
      return text.includes(q.toLowerCase());
    }
    function render() {
      const q = searchEl.value.trim();
      layer.clearLayers();
      listEl.innerHTML = '';
      const shown = [];
      data.forEach((r, i) => {
        if (!activeRegions.has(String(r.regiao)) || !matchesSearch(r, q)) return;
        const marker = markers.get(i);
        marker.addTo(layer);
        shown.push([r.latitude, r.longitude]);
        const item = document.createElement('div');
        item.className = 'item';
        const extra = r.tipo_match === 'município' ? '' : ' - ajuste';
        item.innerHTML = `<strong>${r.cidade_destino}</strong><span>${r.regiao} - ${r.unidade_destino || '-'} - ${r.rotas || '-'}${extra}</span>`;
        item.addEventListener('click', () => { map.setView([r.latitude, r.longitude], 11); marker.openPopup(); });
        listEl.appendChild(item);
      });
      if (shown.length) map.fitBounds(L.latLngBounds(shown).pad(0.08));
    }
    filtersEl.addEventListener('change', (e) => {
      const region = e.target.getAttribute('data-region');
      if (!region) return;
      if (e.target.checked) activeRegions.add(region); else activeRegions.delete(region);
      render();
    });
    searchEl.addEventListener('input', render);
    render();
  </script>
