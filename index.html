<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mapa de Transportadoras PSX</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root { --bg:#f7f7f4; --panel:#ffffff; --ink:#202124; --muted:#5f6368; --line:#d8d9d3; --accent:#0f766e; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial, Helvetica, sans-serif; color:var(--ink); background:var(--bg); }
    .app { display:grid; grid-template-columns:380px 1fr; min-height:100vh; }
    aside { background:var(--panel); border-right:1px solid var(--line); padding:18px; overflow:auto; max-height:100vh; }
    h1 { font-size:21px; line-height:1.2; margin:0 0 8px; }
    .subtitle { color:var(--muted); font-size:13px; margin-bottom:16px; }
    .stats { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-bottom:14px; }
    .stat { border:1px solid var(--line); border-radius:8px; padding:9px; background:#fbfbf9; }
    .stat b { display:block; font-size:19px; }
    .stat span { color:var(--muted); font-size:11px; }
    .search { width:100%; border:1px solid var(--line); border-radius:8px; padding:10px 11px; font-size:14px; margin:4px 0 12px; }
    .filters { display:grid; gap:7px; margin-bottom:14px; }
    label { display:flex; gap:8px; align-items:center; font-size:13px; color:var(--ink); }
    label input { accent-color:var(--accent); }
    .dot { width:11px; height:11px; border-radius:50%; display:inline-block; flex:0 0 auto; border:1px solid rgba(0,0,0,.3); }
    .list { display:grid; gap:8px; }
    .item { border:1px solid var(--line); border-radius:8px; padding:9px; background:#fff; cursor:pointer; }
    .item:hover { border-color:#9ca3af; }
    .item strong { display:block; font-size:13px; }
    .item span { display:block; color:var(--muted); font-size:12px; margin-top:2px; }
    #map { width:100%; height:100vh; }
    .leaflet-popup-content { font-size:13px; line-height:1.35; min-width:300px; max-width:520px; }
    .popup-title { font-weight:700; font-size:15px; margin-bottom:6px; }
    .popup-row { margin:2px 0; }
    .clients { margin-top:8px; max-height:230px; overflow:auto; border:1px solid #e5e7eb; border-radius:6px; }
    table { width:100%; border-collapse:collapse; font-size:12px; }
    th, td { text-align:left; padding:6px; border-bottom:1px solid #eceff3; vertical-align:top; }
    th { background:#f8fafc; position:sticky; top:0; }
    .note { margin-top:12px; color:var(--muted); font-size:11px; line-height:1.35; }
    @media (max-width:820px) { .app { grid-template-columns:1fr; } aside { max-height:42vh; border-right:0; border-bottom:1px solid var(--line); } #map { height:58vh; } }
  </style>
</head>

    const colorMap = {"LEAO EVS": "#f97316", "BRASPRESS IPN": "#38bdf8", "L&L TRANSPORT": "#86efac"};
    const counts = {"BRASPRESS IPN": {"cidades": 335, "clientes": 549}, "L&L TRANSPORT": {"cidades": 44, "clientes": 75}, "LEAO EVS": {"cidades": 125, "clientes": 208}};
    const map = L.map('map', { preferCanvas:true }).setView([-18.358921, -44.162034], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19, attribution:'&copy; OpenStreetMap contributors' }).addTo(map);
    const activeTransporters = new Set(Object.keys(colorMap));
    const markers = new Map();
    const layer = L.layerGroup().addTo(map);
    const listEl = document.getElementById('list');
    const filtersEl = document.getElementById('filters');
    const searchEl = document.getElementById('search');

    function esc(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function markerHtml(color) {
      return `<span style="background:${color};width:14px;height:14px;border-radius:50%;display:block;border:2px solid white;box-shadow:0 0 0 1px rgba(0,0,0,.45)"></span>`;
    }
    function popup(point) {
      const rows = point.clientes.map(c => `<tr><td>${esc(c.cnpj)}</td><td>${esc(c.codigo || '-')}</td><td>${esc(c.razao_social || '-')}</td></tr>`).join('');
      return `<div class="popup-title">${esc(point.cidade)}</div>
        <div class="popup-row"><b>Transportadora:</b> ${esc(point.transportadora)}</div>
        <div class="popup-row"><b>Rota:</b> ${esc(point.rota)}</div>
        <div class="popup-row"><b>Cidade:</b> ${esc(point.nome_mapa)}</div>
        <div class="popup-row"><b>Clientes:</b> ${point.clientes.length}</div>
        <div class="clients"><table><thead><tr><th>CNPJ</th><th>Código</th><th>Razão social</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }
    data.forEach((point, i) => {
      const color = colorMap[point.transportadora] || '#111827';
      const icon = L.divIcon({ html:markerHtml(color), className:'', iconSize:[14,14], iconAnchor:[7,7] });
      const marker = L.marker([point.latitude, point.longitude], { icon }).bindPopup(popup(point));
      markers.set(i, marker);
    });
    Object.entries(colorMap).forEach(([transporter, color]) => {
      const label = document.createElement('label');
      const c = counts[transporter] || { cidades:0, clientes:0 };
      label.innerHTML = `<input type="checkbox" checked data-transporter="${esc(transporter)}"><span class="dot" style="background:${color}"></span><span>${esc(transporter)} (${c.cidades} cidades / ${c.clientes} clientes)</span>`;
      filtersEl.appendChild(label);
    });
    function matchesSearch(point, query) {
      if (!query) return true;
      const clientText = point.clientes.map(c => `${c.cnpj} ${c.codigo} ${c.razao_social}`).join(' ');
      const text = `${point.cidade} ${point.nome_mapa} ${point.transportadora} ${point.rota} ${clientText}`.toLowerCase();
      return text.includes(query.toLowerCase());
    }
    function render() {
      const q = searchEl.value.trim();
      layer.clearLayers();
      listEl.innerHTML = '';
      const shown = [];
      data.forEach((point, i) => {
        if (!activeTransporters.has(point.transportadora) || !matchesSearch(point, q)) return;
        const marker = markers.get(i);
        marker.addTo(layer);
        shown.push([point.latitude, point.longitude]);
        const item = document.createElement('div');
        item.className = 'item';
        item.innerHTML = `<strong>${esc(point.cidade)}</strong><span>${esc(point.transportadora)} - Rota ${esc(point.rota)} - ${point.clientes.length} cliente(s)</span>`;
        item.addEventListener('click', () => { map.setView([point.latitude, point.longitude], 11); marker.openPopup(); });
        listEl.appendChild(item);
      });
      if (shown.length) map.fitBounds(L.latLngBounds(shown).pad(0.08));
    }
    filtersEl.addEventListener('change', event => {
      const transporter = event.target.getAttribute('data-transporter');
      if (!transporter) return;
      if (event.target.checked) activeTransporters.add(transporter); else activeTransporters.delete(transporter);
      render();
    });
    searchEl.addEventListener('input', render);
    render();
  </script>
